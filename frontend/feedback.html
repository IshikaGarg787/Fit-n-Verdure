<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Fit'n Verdure</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .feedback-section { padding: 80px 20px; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, rgba(128, 0, 128, 0.8), rgba(75, 0, 130, 0.8)); height: 100vh; }
    .feedback-container { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1); max-width: 600px; text-align: center; }
    .feedback-container p { color: #777; }
    .feedback-form label { display: block; margin-bottom: 8px; text-align: left; color: #6a1b9a; }
    .feedback-form input, .feedback-form textarea { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ddd; border-radius: 5px; }
    .feedback-form textarea { resize: vertical; }
  </style>
</head>
<body>
    <nav>
        <div class="logo"><h1>Fit'n Verdure</h1></div>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="scan.html">Scan</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="connect.html">Connect</a></li>
          <li><a href="feedback.html">Feedback</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </nav>

  <section class="feedback-section">
    <div class="feedback-container">
      <h2>We Value Your Feedback</h2>
      <p>Help us improve by sharing your thoughts and experiences with us!</p>
      <form action="submit_feedback.php" method="POST" class="feedback-form">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <label for="feedback">Your Feedback</label>
        <textarea id="feedback" name="feedback" rows="5" placeholder="Enter your feedback here..." required></textarea>
        <button type="submit">Submit Feedback</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2025 Fit'n Verdure. All rights reserved.</p>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Fit'n Verdure</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@三百;400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .login-section { padding: 80px 20px; background: #fff; text-align: center; }
    .login-container { max-width: 400px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
    .login-container form { display: flex; flex-direction: column; gap: 20px; }
    .login-container label { font-size: 16px; color: #555; text-align: left; }
    .login-container input[type="text"], .login-container input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
    .login-container a { color: #6a1b9a; text-decoration: none; font-size: 14px; }
    .login-container a:hover { color: #9c27b0; }
  </style>
</head>
<body>
    <nav>
        <div class="logo"><h1>Fit'n Verdure</h1></div>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="scan.html">Scan</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="connect.html">Connect</a></li>
          <li><a href="feedback.html">Feedback</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </nav>
  <section class="login-section">
    <div class="login-container">
      <h2>Login</h2>
      <form>
        <div>
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
        <p><a href="#">Forgot Password?</a></p>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2025 Fit'n Verdure. All rights reserved.</p>
  </footer>
</body>
</html>
